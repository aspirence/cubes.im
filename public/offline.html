<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Cubes</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 10px; background: #0b0d12; color: #e7e5f0; text-align: center; padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .mark { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(140deg, #34346a 0%, #4a4ad0 100%); font-size: 28px; }
      h1 { font-size: 19px; font-weight: 700; margin: 6px 0 0; }
      p { color: #9a94b8; font-size: 14px; max-width: 340px; line-height: 1.6; margin: 0; }
      button { margin-top: 10px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06);
        color: #fff; border-radius: 10px; padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="mark">◧</div>
    <h1>You're offline</h1>
    <p>Cubes needs a connection to load. Check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </body>
</html>
